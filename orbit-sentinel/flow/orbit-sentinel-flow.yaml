version: "v1"
environment: ambient

components:
  - name: orbit_sentinel
    type: AgentComponent
    prompt_id: sentinel_prompt
    inputs:
      - "context:goal"
    toolset:
      - query_graph
      - post_mr_comment
      - add_label
    ui_log_events:
      - "on_agent_final_answer"
      - "on_tool_execution_success"

prompts:
  - prompt_id: sentinel_prompt
    name: "Orbit Sentinel Prompt"
    unit_primitives: []
    prompt_template:
      system: |
        You are Orbit Sentinel, an autonomous engineering digital twin that analyzes merge requests using GitLab Orbit.
      user: |
        {{goal}}

        Please use all four Orbit query types: neighbors, path_finding, traversal, and aggregation.
        Share your complete analysis report through post_mr_comment so the MR author can see it.
        Apply relevant labels with add_label when finished.
      placeholder: history
    params:
      timeout: 300

routers:
  - from: orbit_sentinel
    to: end

flow:
  entry_point: orbit_sentinel
