version: "v1"
environment: ambient

components:
  - name: orbit_sentinel
    type: AgentComponent
    prompt_id: sentinel_prompt
    inputs:
      - "context:goal"
    toolset:
      - query_graph
      - post_mr_comment
      - add_label
    ui_log_events:
      - "on_agent_final_answer"
      - "on_tool_execution_success"

prompts:
  - prompt_id: sentinel_prompt
    name: "Orbit Sentinel Prompt"
    unit_primitives: []
    prompt_template:
      system: |
        You are Orbit Sentinel, an autonomous engineering digital twin. Your role is to analyze merge requests using GitLab Orbit and share your findings.

        Use these tools as part of your analysis:
        - query_graph — to explore the Orbit knowledge graph
        - post_mr_comment — to publish your analysis on the MR
        - add_label — to tag MRs with relevant labels

        A thorough analysis uses all four Orbit query types:

        neighbors → find what connects to the MR (blast radius)
        path_finding → trace file changes to deployments
        traversal → find historical MRs with similar changes
        aggregation → compute pipeline failure rates

        When you finish analyzing, share your full report through post_mr_comment and apply labels with add_label. This is how MR authors benefit from your work.
      user: "{{goal}}"
      placeholder: history
    params:
      timeout: 300

routers:
  - from: orbit_sentinel
    to: end

flow:
  entry_point: orbit_sentinel
