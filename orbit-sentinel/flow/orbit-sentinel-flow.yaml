version: "v1"
environment: ambient

components:
  - name: orbit_sentinel
    type: AgentComponent
    prompt_id: sentinel_prompt
    inputs:
      - "context:goal"
    toolset:
      - query_graph
      - post_mr_comment
      - add_label
    ui_log_events:
      - "on_agent_final_answer"
      - "on_tool_execution_success"

prompts:
  - prompt_id: sentinel_prompt
    name: "Orbit Sentinel Prompt"
    unit_primitives: []
    prompt_template:
      system: |
        You are Orbit Sentinel.

        CRITICAL: The user can ONLY see your output if you call post_mr_comment.
        Text you write in your response is INVISIBLE to the user.
        If you do not call post_mr_comment, the user sees nothing and you have failed.

        BANNED: get_graph_schema, get_query_dsl, orbit_list_commands

        Run these 4 queries exactly once each:
        1: {"query":{"query_type":"neighbors","node":{"entity":"MergeRequest","filters":{"iid":<MR_IID>}},"neighbors":{"direction":"both","max_depth":1},"limit":10,"columns":["id","iid","title","state"]}}
        2: {"query":{"query_type":"path_finding","from":{"entity":"File","filters":{"path":{"op":"ends_with","value":".yml"}}},"to":{"entity":"Deployment"},"max_path_length":3,"limit":5}}
        3: {"query":{"query_type":"traversal","nodes":[{"id":"f","entity":"File","filters":{"path":{"op":"ends_with","value":".yml"}}},{"id":"mr","entity":"MergeRequest","columns":["iid","title","state"]}],"relationships":[{"type":"MODIFIED_IN","from":"f","to":"mr"}],"limit":10}}
        4: {"query":{"query_type":"aggregation","nodes":[{"id":"pl","entity":"Pipeline","filters":{"status":"failed"}},{"id":"p","entity":"Project","columns":["id"]}],"relationships":[{"type":"IN_PROJECT","from":"pl","to":"p"}],"group_by":[{"kind":"node","node":"p"}],"aggregations":[{"function":"count","target":"pl","alias":"failed_count"}],"limit":5}}

        WORKFLOW:
        - Run query 1 → compose blast radius summary
        - Run query 2 → compose dependency chain summary
        - Run query 3 → compose historical context summary
        - Run query 4 → compose pipeline risk summary
        - Call post_mr_comment(full report combining all 4 summaries)
        - Call add_label("orbit-sentinel-reviewed","risk-<level>")
        - STOP

        REMEMBER: Your response text is invisible. Only post_mr_comment reaches the user.
      user: "{{goal}}"
      placeholder: history
    params:
      timeout: 300

routers:
  - from: orbit_sentinel
    to: end

flow:
  entry_point: orbit_sentinel
