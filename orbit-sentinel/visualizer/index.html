    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%2308090d'/%3E%3Ctext x='16' y='22' font-size='20' text-anchor='middle'%3E🛰️%3C/text%3E%3C/svg%3E" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { height: 100%; min-height: 100vh; }

      :root {
        --bg-primary: #08090d;
        --bg-card: rgba(15, 18, 26, 0.7);
        --bg-elevated: rgba(22, 26, 36, 0.85);
        --border: rgba(255,255,255,0.06);
        --border-hover: rgba(255,255,255,0.1);
        --text-primary: rgba(255,255,255,0.92);
        --text-secondary: rgba(255,255,255,0.45);
        --text-tertiary: rgba(255,255,255,0.25);
        --accent-blue: #3b82f6;
        --accent-purple: #8b5cf6;
        --accent-green: #22c55e;
        --accent-orange: #f97316;
        --accent-red: #ef4444;
        --accent-cyan: #22d3ee;
        --accent-pink: #f472b6;
        --accent-indigo: #818cf8;
        --radius-sm: 6px;
        --radius-md: 10px;
        --radius-lg: 16px;
        --shadow-card: 0 4px 32px rgba(0,0,0,0.4);
        --shadow-elevated: 0 8px 48px rgba(0,0,0,0.5);
      }
      [data-theme="light"] {
        --bg-primary: #f5f7fa;
        --bg-card: rgba(255,255,255,0.85);
        --bg-elevated: rgba(255,255,255,0.95);
        --border: rgba(0,0,0,0.08);
        --border-hover: rgba(0,0,0,0.12);
        --text-primary: rgba(0,0,0,0.88);
        --text-secondary: rgba(0,0,0,0.45);
        --text-tertiary: rgba(0,0,0,0.25);
        --shadow-card: 0 2px 16px rgba(0,0,0,0.08);
        --shadow-elevated: 0 4px 24px rgba(0,0,0,0.12);
      }
      [data-theme="dark"] {
        --bg-primary: #08090d;
        --bg-card: rgba(15, 18, 26, 0.7);
        --bg-elevated: rgba(22, 26, 36, 0.85);
        --border: rgba(255,255,255,0.06);
        --border-hover: rgba(255,255,255,0.1);
        --text-primary: rgba(255,255,255,0.92);
        --text-secondary: rgba(255,255,255,0.45);
        --text-tertiary: rgba(255,255,255,0.25);
        --shadow-card: 0 4px 32px rgba(0,0,0,0.4);
        --shadow-elevated: 0 8px 48px rgba(0,0,0,0.5);
      }

      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        background: var(--bg-primary);
        color: var(--text-primary);
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        line-height: 1.5;
      }

      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
      ::selection { background: rgba(59,130,246,0.3); color: #fff; }

      /* === ANIMATIONS === */
      @keyframes fadeSlideUp {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes fadeSlideDown {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes scaleIn {
        from { opacity: 0; transform: scale(0.95); }
        to { opacity: 1; transform: scale(1); }
      }
      @keyframes shimmer {
        0% { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }
      @keyframes pulseDot {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.5; transform: scale(1.3); }
      }
      @keyframes glowPulse {
        0%, 100% { filter: drop-shadow(0 0 6px rgba(239,68,68,0.3)); }
        50% { filter: drop-shadow(0 0 16px rgba(239,68,68,0.6)); }
      }
      @keyframes countUp {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes gradientShift {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }
      @keyframes pulseGlow {
        0%, 100% { filter: drop-shadow(0 0 8px rgba(59,130,246,0.15)); }
        50% { filter: drop-shadow(0 0 24px rgba(59,130,246,0.35)); }
      }
      @keyframes float {
        0%, 100% { transform: translateY(0) rotate(0deg); }
        25% { transform: translateY(-8px) rotate(0.5deg); }
        75% { transform: translateY(4px) rotate(-0.5deg); }
      }
      @keyframes breathe {
        0%, 100% { opacity: 0.6; transform: scale(1); }
        50% { opacity: 0.8; transform: scale(1.02); }
      }
      @keyframes scanLine {
        0% { top: -10%; opacity: 0; }
        10% { opacity: 0.6; }
        90% { opacity: 0.6; }
        100% { top: 110%; opacity: 0; }
      }
      @keyframes ripple {
        0% { transform: scale(0.95); opacity: 0.5; }
        100% { transform: scale(1.5); opacity: 0; }
      }
      @keyframes shimmer-wide {
        0% { background-position: -200% center; }
        100% { background-position: 200% center; }
      }
      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      @keyframes floatUp {
        0% { transform: translateY(0) scale(1); opacity: 1; }
        100% { transform: translateY(-100px) scale(0); opacity: 0; }
      }
      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        10%, 30%, 50%, 70%, 90% { transform: translateX(-3px); }
        20%, 40%, 60%, 80% { transform: translateX(3px); }
      }
      @keyframes slideInRight {
        from { opacity: 0; transform: translateX(20px); }
        to { opacity: 1; transform: translateX(0); }
      }
      @keyframes slideInLeft {
        from { opacity: 0; transform: translateX(-20px); }
        to { opacity: 1; transform: translateX(0); }
      }
      @keyframes countUpBar {
        from { width: 0; }
      }
      @keyframes progressPulse {
        0%, 100% { box-shadow: 0 0 8px currentColor; }
        50% { box-shadow: 0 0 20px currentColor; }
      }
      @keyframes slideUp {
        from { opacity: 0; transform: translateY(4px); }
        to { opacity: 1; transform: translateY(0); }
      }

      /* Orb drift animations */
      @keyframes orb-drift-1 {
        0%, 100% { transform: translate(0, 0) scale(1); }
        25% { transform: translate(40px, -50px) scale(1.1); }
        50% { transform: translate(-30px, -90px) scale(0.9); }
        75% { transform: translate(-50px, -20px) scale(1.05); }
      }
      @keyframes orb-drift-2 {
        0%, 100% { transform: translate(0, 0) scale(1); }
        25% { transform: translate(-45px, 40px) scale(0.95); }
        50% { transform: translate(35px, 70px) scale(1.1); }
        75% { transform: translate(50px, -15px) scale(0.9); }
      }
      @keyframes orb-drift-3 {
        0%, 100% { transform: translate(0, 0) scale(1); }
        33% { transform: translate(50px, 30px) scale(0.95); }
        66% { transform: translate(-40px, -40px) scale(1.05); }
      }

      /* === UTILITY CLASSES === */
      .card {
        background: var(--bg-card);
        border-radius: var(--radius-lg);
        border: 1px solid var(--border);
        box-shadow: var(--shadow-card);
      }
      button:focus-visible {
        outline: 2px solid var(--accent-blue, #60a5fa);
        outline-offset: 2px;
      }
      .card-header-icon {
        width: 28px; height: 28px; border-radius: var(--radius-sm);
        display: flex; align-items: center; justify-content: center;
        font-size: 14px; flex-shrink: 0;
      }
      .glow-red { box-shadow: 0 0 20px rgba(239,68,68,0.15), inset 0 0 20px rgba(239,68,68,0.05); }
      .glow-orange { box-shadow: 0 0 20px rgba(249,115,22,0.15), inset 0 0 20px rgba(249,115,22,0.05); }
      .glow-blue { box-shadow: 0 0 20px rgba(59,130,246,0.15), inset 0 0 20px rgba(59,130,246,0.05); }
      .glow-green { box-shadow: 0 0 20px rgba(34,197,94,0.15), inset 0 0 20px rgba(34,197,94,0.05); }
      .glow-purple { box-shadow: 0 0 20px rgba(139,92,246,0.15), inset 0 0 20px rgba(139,92,246,0.05); }

      .bg-grid {
        background-image:
          linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
        background-size: 48px 48px;
      }

      .bg-grain {
        position: fixed; inset: 0; z-index: 0; pointer-events: none;
        opacity: 0.035;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        background-repeat: repeat;
        background-size: 256px 256px;
        mix-blend-mode: overlay;
      }

      .shimmer-loading {
        background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.04) 50%, transparent 100%);
        background-size: 200% 100%;
        animation: shimmer-wide 2s ease-in-out infinite;
      }

      /* === RESPONSIVE === */
      @media (max-width: 1100px) {
        .resp-hide-4queries { display: none !important; }
      }
      @media (max-width: 900px) {
        .resp-grid-2 { grid-template-columns: 1fr !important; }
        .resp-grid-3 { grid-template-columns: 1fr !important; }
        .resp-grid-4 { grid-template-columns: 1fr !important; }
        .resp-grid-5 { grid-template-columns: repeat(2, 1fr) !important; }
        header { flex-wrap: wrap; gap: 4px; padding: 6px 12px !important; overflow-x: hidden; }
        .header-nav { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .header-nav::-webkit-scrollbar { display: none; }
      }
      @media (max-width: 768px) {
        .card { border-radius: 10px; }
        main { padding: 10px !important; }
        .resp-grid-5 { grid-template-columns: repeat(2, 1fr) !important; }
        .resp-hide-dots { display: none !important; }
        .resp-hide-subtitle { display: none !important; }
        .resp-nav-compact button { padding: 3px 8px !important; font-size: 10px !important; }
        .resp-nav-compact .resp-nav-action { padding: 3px 8px !important; font-size: 10px !important; }
        .resp-hide-query-tag span { display: none !important; }
        .resp-hero-column { flex-direction: column !important; }
        .resp-hero-column > div:last-child { width: 100% !important; }
        .resp-graph-info { width: 140px !important; padding: 6px 8px !important; top: 4px !important; right: 4px !important; }
        .resp-graph-info .resp-graph-info-text { font-size: 7px !important; }
        .resp-graph-status { gap: 2px !important; padding: 4px 6px !important; flex-wrap: wrap !important; }
        .resp-graph-status .resp-stat { font-size: 8px !important; }
      }
      @media (max-width: 480px) {
        .card { border-radius: 8px; }
        main { padding: 6px !important; }
        .resp-grid-5 { grid-template-columns: 1fr !important; }
        .resp-stack { flex-direction: column !important; }
        .resp-hide-mobile-bar { display: none !important; }
      }
      @media (max-width: 360px) {
        .resp-hide-tabs { display: none !important; }
        .resp-show-menu { display: flex !important; }
        .resp-compact { font-size: 9px !important; padding: 3px 8px !important; }
        .resp-full { width: 100% !important; }
      }

      @media print {
        body { background: #fff !important; color: #000 !important; overflow: visible !important; }
        header { display: none !important; }
        footer { display: none !important; }
        .card { background: #f5f5f5 !important; border-color: #ddd !important; break-inside: avoid; }
        [class*="glow-"] { box-shadow: none !important; }
        .bg-grid { display: none !important; }
        .bg-grain { display: none !important; }
        @page { margin: 0.5in; }
      }
    </style>
  </head>
  <body>
    <div class="bg-grain"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
