<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orbit Sentinel — Engineering Decision Intelligence</title>
    <meta name="description" content="Autonomous engineering digital twin built on GitLab Orbit. Real-time MR risk analysis, blast radius visualization, and what-if simulation." />
    <meta property="og:title" content="Orbit Sentinel — Engineering Decision Intelligence" />
    <meta property="og:description" content="Autonomous engineering digital twin powered by GitLab Orbit. Predict deployment risks before they happen." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://gitlab-ai-hackathon.gitlab.io/transcend/39251857/og-image.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { height: 100%; min-height: 100vh; }

      :root {
        --bg-primary: #08090d;
        --bg-card: rgba(15, 18, 26, 0.7);
        --bg-elevated: rgba(22, 26, 36, 0.85);
        --border: rgba(255,255,255,0.06);
        --border-hover: rgba(255,255,255,0.1);
        --text-primary: rgba(255,255,255,0.92);
        --text-secondary: rgba(255,255,255,0.45);
        --text-tertiary: rgba(255,255,255,0.25);
        --accent-blue: #3b82f6;
        --accent-purple: #8b5cf6;
        --accent-green: #22c55e;
        --accent-orange: #f97316;
        --accent-red: #ef4444;
        --accent-cyan: #22d3ee;
        --accent-pink: #f472b6;
        --accent-indigo: #818cf8;
        --radius-sm: 6px;
        --radius-md: 10px;
        --radius-lg: 16px;
        --shadow-card: 0 4px 32px rgba(0,0,0,0.4);
        --shadow-elevated: 0 8px 48px rgba(0,0,0,0.5);
      }

      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        background: var(--bg-primary);
        color: var(--text-primary);
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        line-height: 1.5;
      }

      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
      ::selection { background: rgba(59,130,246,0.3); color: #fff; }

      /* === ANIMATIONS === */
      @keyframes fadeSlideUp {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes fadeSlideDown {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes scaleIn {
        from { opacity: 0; transform: scale(0.95); }
        to { opacity: 1; transform: scale(1); }
      }
      @keyframes shimmer {
        0% { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }
      @keyframes pulseDot {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.5; transform: scale(1.3); }
      }
      @keyframes glowPulse {
        0%, 100% { filter: drop-shadow(0 0 6px rgba(239,68,68,0.3)); }
        50% { filter: drop-shadow(0 0 16px rgba(239,68,68,0.6)); }
      }
      @keyframes countUp {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes gradientShift {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }
      @keyframes pulseGlow {
        0%, 100% { filter: drop-shadow(0 0 8px rgba(59,130,246,0.15)); }
        50% { filter: drop-shadow(0 0 24px rgba(59,130,246,0.35)); }
      }
      @keyframes float {
        0%, 100% { transform: translateY(0) rotate(0deg); }
        25% { transform: translateY(-8px) rotate(0.5deg); }
        75% { transform: translateY(4px) rotate(-0.5deg); }
      }
      @keyframes breathe {
        0%, 100% { opacity: 0.6; transform: scale(1); }
        50% { opacity: 0.8; transform: scale(1.02); }
      }
      @keyframes scanLine {
        0% { top: -10%; opacity: 0; }
        10% { opacity: 0.6; }
        90% { opacity: 0.6; }
        100% { top: 110%; opacity: 0; }
      }
      @keyframes ripple {
        0% { transform: scale(0.95); opacity: 0.5; }
        100% { transform: scale(1.5); opacity: 0; }
      }
      @keyframes shimmer-wide {
        0% { background-position: -200% center; }
        100% { background-position: 200% center; }
      }
      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      @keyframes floatUp {
        0% { transform: translateY(0) scale(1); opacity: 1; }
        100% { transform: translateY(-100px) scale(0); opacity: 0; }
      }

      /* Orb drift animations */
      @keyframes orb-drift-1 {
        0%, 100% { transform: translate(0, 0) scale(1); }
        25% { transform: translate(40px, -50px) scale(1.1); }
        50% { transform: translate(-30px, -90px) scale(0.9); }
        75% { transform: translate(-50px, -20px) scale(1.05); }
      }
      @keyframes orb-drift-2 {
        0%, 100% { transform: translate(0, 0) scale(1); }
        25% { transform: translate(-45px, 40px) scale(0.95); }
        50% { transform: translate(35px, 70px) scale(1.1); }
        75% { transform: translate(50px, -15px) scale(0.9); }
      }
      @keyframes orb-drift-3 {
        0%, 100% { transform: translate(0, 0) scale(1); }
        33% { transform: translate(50px, 30px) scale(0.95); }
        66% { transform: translate(-40px, -40px) scale(1.05); }
      }

      /* === UTILITY CLASSES === */
      .card {
        background: var(--bg-card);
        border-radius: var(--radius-lg);
        border: 1px solid var(--border);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        box-shadow: var(--shadow-card);
        transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .card:hover {
        border-color: var(--border-hover);
        box-shadow: var(--shadow-elevated);
      }
      .card-header-icon {
        width: 28px; height: 28px; border-radius: var(--radius-sm);
        display: flex; align-items: center; justify-content: center;
        font-size: 14px; flex-shrink: 0;
      }
      .glow-red { box-shadow: 0 0 20px rgba(239,68,68,0.15), inset 0 0 20px rgba(239,68,68,0.05); }
      .glow-orange { box-shadow: 0 0 20px rgba(249,115,22,0.15), inset 0 0 20px rgba(249,115,22,0.05); }
      .glow-blue { box-shadow: 0 0 20px rgba(59,130,246,0.15), inset 0 0 20px rgba(59,130,246,0.05); }
      .glow-green { box-shadow: 0 0 20px rgba(34,197,94,0.15), inset 0 0 20px rgba(34,197,94,0.05); }
      .glow-purple { box-shadow: 0 0 20px rgba(139,92,246,0.15), inset 0 0 20px rgba(139,92,246,0.05); }

      .bg-grid {
        background-image:
          linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
        background-size: 48px 48px;
      }

      .shimmer-loading {
        background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.04) 50%, transparent 100%);
        background-size: 200% 100%;
        animation: shimmer-wide 2s ease-in-out infinite;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
