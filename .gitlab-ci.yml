image: node:22

stages:
  - test
  - lint
  - build
  - deploy

variables:
  PAGES_BRANCH: main
  NODE_OPTIONS: \"--max-old-space-size=4096\"

cache:
  key: \
  paths:
    - orbit-sentinel/engine/node_modules/
    - orbit-sentinel/visualizer/node_modules/

test_engine:
  stage: test
  script:
    - cd orbit-sentinel/engine
    - npm ci
    - npm run test
  rules:
    - if: \
    - if: \ == \

lint_engine:
  stage: lint
  script:
    - cd orbit-sentinel/engine
    - npm ci
    - npx tsc --noEmit
    - npx eslint src/ --ext .ts || true
  rules:
    - if: \
    - if: \ == \

lint_visualizer:
  stage: lint
  script:
    - cd orbit-sentinel/visualizer
    - npm ci
    - npx tsc --noEmit
  rules:
    - if: \
    - if: \ == \

build_engine:
  stage: build
  script:
    - cd orbit-sentinel/engine
    - npm ci
    - npm run build
  artifacts:
    paths:
      - orbit-sentinel/engine/dist/
    expire_in: 1 day
  needs: [test_engine, lint_engine]
  rules:
    - if: \
    - if: \ == \

build_visualizer:
  stage: build
  script:
    - cd orbit-sentinel/visualizer
    - npm ci
    - npm run build
  artifacts:
    paths:
      - orbit-sentinel/visualizer/dist/
    expire_in: 1 day
  needs: [lint_visualizer]
  rules:
    - if: \
    - if: \ == \

pages:
  stage: deploy
  script:
    - mkdir -p public
    - cp -r orbit-sentinel/visualizer/dist/* public/
  artifacts:
    paths:
      - public/
  needs: [build_visualizer]
  rules:
    - if: \ == \
      when: always
