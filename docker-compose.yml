services:
  engine:
    build:
      context: orbit-sentinel/engine
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - ORBIT_API_KEY=${ORBIT_API_KEY:-}
      - ORBIT_ENDPOINT=${ORBIT_ENDPOINT:-https://api.orbit.dev}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/health').then(r => process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3

  visualizer:
    build:
      context: orbit-sentinel/visualizer
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      engine:
        condition: service_healthy
    environment:
      - VITE_API_BASE_URL=http://engine:3001
